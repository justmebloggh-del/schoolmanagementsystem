<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login | Ghana School Management Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="student-login">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
<span class="brand-mark"><img src="src/assets/images/gaffer-logo.png" alt="Logo" width="100"></span>
      </a>
      <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars"></i>
      </button>
      <nav class="site-nav" aria-label="Main">
        <a href="index.html" data-nav="home">Home</a>
        <a href="school-auth.html" data-nav="school-auth">School Account</a>
        <a href="admissions.html" data-nav="admissions">Admissions</a>
        <a href="careers.html" data-nav="careers">Careers</a>
        <a href="course-registration.html" data-nav="registration">Registration</a>
        <a href="student-login.html" data-nav="student-login">Student Login</a>
        <a href="teacher-login.html" data-nav="teacher-login">Staff Login</a>
        <a href="admin-dashboard.html" data-nav="dashboard">Admin Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container narrow">
      <div class="login-panel">
        <h2>Student Login</h2>
        <form id="studentLoginForm" class="app-form" novalidate>
          <label>
            Student ID or Email
            <input type="text" name="identifier" required placeholder="STU-1001 or email">
          </label>
          <label>
            Password
            <input type="password" name="password" required placeholder="Your password">
          </label>
          <button class="btn btn-primary" type="submit">Sign In</button>
          <p id="studentLoginMessage" class="form-message" role="status" aria-live="polite"></p>
        </form>
        <div class="panel sub-panel">
          <p><strong>Demo student:</strong> STU-1001 / Student@123</p>
          <p>or email: daniel.agyekum@student.edu.gh</p>
          <p>New student? <a href="admissions.html">Apply for admission</a></p>
        </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> Ghana School Management Platform</p>
      <p>Student portal access.</p>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    const form = document.getElementById('studentLoginForm');
    const messageEl = document.getElementById('studentLoginMessage');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const identifier = form.querySelector('[name="identifier"]').value.trim();
      const password = form.querySelector('[name="password"]').value;

      const result = await SMSStore.loginStudent(identifier, password);
      
      if (result.ok) {
        messageEl.textContent = 'Login successful! Redirecting...';
        messageEl.className = 'form-message success';
        setTimeout(() => window.location.href = 'course-registration.html', 1000);
      } else {
        messageEl.textContent = result.message;
        messageEl.className = 'form-message error';
      }
    });
  </script>
</body>
</html>
