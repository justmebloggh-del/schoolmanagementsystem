<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | Ghana School Management Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="teacher-login">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark"><img src="/src/assets/images/B4C07D7C-4D10-42C4-971A-112A666238A4.jpg" alt="A.D FASEMKYE Logo" width="100"></span>
      </a>
      <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars"></i>
      </button>
      <nav class="site-nav" aria-label="Main">
        <a href="index.html" data-nav="home">Home</a>
        <a href="school-auth.html" data-nav="school-auth">School Account</a>
        <a href="admissions.html" data-nav="admissions">Admissions</a>
        <a href="course-registration.html" data-nav="registration">Registration</a>
        <a href="student-login.html" data-nav="student-login">Student Login</a>
        <a href="teacher-login.html" data-nav="teacher-login">Staff Login</a>
        <a href="admin-dashboard.html" data-nav="dashboard">Admin Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container narrow">
      <div class="panel login-panel">
        <p class="eyebrow">Faculty and Operations</p>
        <h1>Login</h1>
                <p>Sign in with staff email or staff ID to manage admissions, students, staff, and exam records.</p>

        <form id="teacherLoginForm" class="app-form" novalidate>
          <label>
            Staff Email or ID
            <input type="text" name="identifier" required placeholder="teacher@school.edu.gh or STF-1001">
          </label>
          <label>
            Password
            <input type="password" name="password" required placeholder="Enter password">
          </label>
          <button type="submit" class="btn btn-primary">Sign In</button>
          <p id="teacherLoginMessage" class="form-message" role="status" aria-live="polite"></p>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> Ghana School Management Platform</p>
      <p>Academic operations and reporting.</p>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
